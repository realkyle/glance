<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      background: transparent;
    }

    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      line-height: 1.7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    #hint span {
      display: block;
      font-size: 12px;
      opacity: 0.55;
      font-weight: 400;
      margin-top: 4px;
    }

    #selection {
      position: fixed;
      display: none;
      background: transparent;
      border: 2px solid rgb(139,92,246);
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(139,92,246,0.3);
    }

    #dims {
      position: fixed;
      display: none;
      background: rgb(139,92,246);
      color: white;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
    }

    /* dim before selection starts */
    #pre-dim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="pre-dim"></div>
  <div id="hint">
    Click and drag to select a region
    <span>Press Escape to cancel</span>
  </div>
  <div id="selection"></div>
  <div id="dims"></div>

  <script>
    const sel   = document.getElementById('selection');
    const hint  = document.getElementById('hint');
    const dims  = document.getElementById('dims');
    const preDim = document.getElementById('pre-dim');

    let startX = 0, startY = 0, drawing = false;

    document.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      startY = e.clientY;
      drawing = true;
      hint.style.display = 'none';
      preDim.style.display = 'none';
      sel.style.display = 'block';
      dims.style.display = 'block';
      update(e);
    });

    document.addEventListener('mousemove', (e) => {
      if (!drawing) return;
      update(e);
    });

    document.addEventListener('mouseup', (e) => {
      if (!drawing) return;
      drawing = false;

      const x = Math.min(startX, e.clientX);
      const y = Math.min(startY, e.clientY);
      const width  = Math.abs(e.clientX - startX);
      const height = Math.abs(e.clientY - startY);

      if (width < 8 || height < 8) {
        window.selectorAPI.cancel();
        return;
      }

      window.selectorAPI.sendRegion({ x, y, width, height });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.selectorAPI.cancel();
    });

    function update(e) {
      const x = Math.min(startX, e.clientX);
      const y = Math.min(startY, e.clientY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);

      sel.style.left   = x + 'px';
      sel.style.top    = y + 'px';
      sel.style.width  = w + 'px';
      sel.style.height = h + 'px';

      dims.textContent = `${Math.round(w)} × ${Math.round(h)}`;
      const labelY = y > 30 ? y - 26 : y + h + 6;
      dims.style.left = (x + w / 2 - dims.offsetWidth / 2) + 'px';
      dims.style.top  = labelY + 'px';
    }
  </script>
</body>
</html>
